name: Deploy WhatsApp Assistant

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY }}
          port: 22
          script_stop: true
          script: |
            # 1. Load fnm and Node into the path
            export PATH="$HOME/.local/share/fnm:$PATH"
            eval "$(fnm env --shell bash)"

            cd /var/www/whatsapp-assistant

            # 2. Stop the service (or use PM2 if you switched)
            sudo systemctl stop whatsapp-assistant

            # 3. Update code
            git pull origin main

            # 4. Install dependencies and Build using Node
            export NODE_ENV=production
            
            # --omit=dev keeps it light on your VPS by skipping test tools
            npm install --omit=dev
            
            # If your migrations/build require devDependencies, use:
            # npm install && npm run build && npm prune --production

            npm run db:migrate
            npm run db:push
            npm run build

            # 5. Restart the service
            sudo systemctl restart whatsapp-assistant