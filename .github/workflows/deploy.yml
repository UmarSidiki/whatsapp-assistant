name: Deploy WhatsApp Assistant

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY }}
          port: 22
          script_stop: true
          script: |
            # 1. Load Bun into the path
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"

            cd /var/www/whatsapp-assistant

            # 2. Stop the service
            sudo systemctl stop whatsapp-assistant

            # 3. Update code
            git pull origin main

            # 4. Install dependencies and Build using Bun
            bun install
            bun run db:migrate
            bun run db:push
            bun run build

            # 5. Restart the service
            sudo systemctl restart whatsapp-assistant
