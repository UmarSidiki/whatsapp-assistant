name: Deploy WhatsApp Assistant

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY }}
          port: 22
          script_stop: true
          script: |
            # 1. Load NVM so 'npm' and 'node' are recognized
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /var/www/whatsapp-assistant

            # 2. Update code (removed 'sudo' to avoid permission locks)
            git pull origin main

            # 3. Install and Build
            npm install --production
            npm run db:migrate --if-present
            npm run build --if-present

            # 4. Restart the service
            sudo systemctl restart whatsapp-assistant